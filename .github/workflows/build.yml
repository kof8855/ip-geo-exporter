name: Build and Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Build linux/${{ matrix.goarch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o ip-geo-exporter-linux-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ip-geo-exporter-linux-${{ matrix.goarch }}
          path: ip-geo-exporter-linux-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            ## ip-geo-exporter ${{ github.ref_name }}

            ### 安装

            ```bash
            wget -O /usr/local/bin/ip-geo-exporter https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ip-geo-exporter-linux-amd64
            chmod +x /usr/local/bin/ip-geo-exporter
            ```
